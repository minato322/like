<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>温柔心迹 · 饱满爱心自动满卡</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fff5ee 0%, #ffebf0 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px 0 20px 0;
            position: relative;
        }

        .heart-canvas {
            position: relative;
            width: 100%;
            height: 68vh;
            min-height: 460px;
            max-height: 620px;
            margin: 12px 0 16px 0;
            overflow: visible;
            touch-action: pan-x pan-y;
        }

        /* 卡片尺寸整体缩小，让爱心线条更明显 */
        .care-card {
            position: absolute;
            width: 88px;
            height: 80px;
            background: #fff4e8;
            border-radius: 24px 14px 24px 14px;
            box-shadow: 0 10px 18px rgba(0, 0, 0, 0.12), 0 0 0 2px rgba(255, 245, 235, 0.8) inset;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: 600;
            font-size: 0.9rem;
            color: #2c241a;
            cursor: pointer;
            transition: left 0.55s cubic-bezier(0.2, 0.85, 0.4, 1.1), top 0.55s cubic-bezier(0.2, 0.85, 0.4, 1.1), transform 0.2s ease;
            backdrop-filter: blur(1px);
            word-break: break-word;
            padding: 6px;
            z-index: 10;
            line-height: 1.3;
            will-change: left, top;
            transform: translate(-50%, -50%);
            font-family: inherit;
        }

        .care-card:hover {
            transform: translate(-50%, -50%) scale(1.04);
            box-shadow: 0 18px 28px rgba(0, 0, 0, 0.18);
            z-index: 20;
        }

        /* 手机端进一步缩小卡片，更贴合爱心轮廓 */
        @media (max-width: 680px) {
            .care-card {
                width: 70px;
                height: 65px;
                font-size: 0.75rem;
                padding: 4px;
                border-radius: 20px 12px 20px 12px;
            }
            .heart-canvas {
                height: 62vh;
                min-height: 420px;
            }
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 18px;
            margin: 8px 0 12px;
            z-index: 30;
            padding: 0 12px;
        }

        button {
            background: #ff859f;
            border: none;
            padding: 10px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 0 #b14862;
            transition: 0.08s linear;
            font-family: inherit;
            letter-spacing: 1px;
            backdrop-filter: blur(4px);
            touch-action: manipulation;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #b14862;
        }

        .special-btn {
            background: #ff5a7c;
            box-shadow: 0 4px 0 #a13c54;
            font-size: 1rem;
            padding: 10px 26px;
            animation: softGlow 1.8s infinite;
        }

        @keyframes softGlow {
            0% {
                box-shadow: 0 4px 0 #a13c54, 0 0 0 0 rgba(255, 90, 124, 0.4);
            }
            70% {
                box-shadow: 0 4px 0 #a13c54, 0 0 0 12px rgba(255, 90, 124, 0);
            }
            100% {
                box-shadow: 0 4px 0 #a13c54, 0 0 0 0 rgba(255, 90, 124, 0);
            }
        }

        .info {
            background: rgba(255, 245, 235, 0.9);
            backdrop-filter: blur(12px);
            padding: 6px 18px;
            border-radius: 48px;
            font-size: 0.8rem;
            color: #aa4e66;
            font-weight: 500;
            border: 1px solid #ffcdd9;
            margin-top: 6px;
            text-align: center;
            width: 90%;
        }

        .counter-badge {
            background: #ffbfcf;
            padding: 4px 12px;
            border-radius: 40px;
            color: #572c3a;
            font-weight: bold;
            font-size: 0.8rem;
            display: inline-block;
            margin-top: 6px;
        }

        /* 最终告白弹窗 */
        .final-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: #fffaf5;
            padding: 20px 28px;
            border-radius: 56px;
            box-shadow: 0 28px 44px rgba(0, 0, 0, 0.25), 0 0 0 6px #ffe2ea, 0 0 0 12px #ffb0c0;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: #ce4162;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            letter-spacing: 1px;
            backdrop-filter: blur(20px);
            white-space: nowrap;
            border: 1px solid #ffbfce;
            line-height: 1.4;
        }

        @media (max-width: 560px) {
            .final-modal {
                font-size: 1.2rem;
                padding: 14px 22px;
                white-space: normal;
                width: 80%;
                text-align: center;
            }
        }

        .final-modal.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
            animation: bouncePop 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
        }

        @keyframes bouncePop {
            0% {
                transform: translate(-50%, -50%) scale(0.7);
                opacity: 0;
            }
            80% {
                transform: translate(-50%, -50%) scale(1.05);
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }
    </style>
</head>
<body>

<div class="heart-canvas" id="heartCanvas"></div>

<div class="controls">
    <button id="addBtn">✨ 手动加一张 ✨</button>
    <button id="finalBtn" class="special-btn">💖 提前告白 💖</button>
</div>
<div class="info">
    💗 卡片自动慢慢增加到40张，组成饱满爱心，最后弹出告白 💗<br>
    <span class="counter-badge" id="cardCounter">❤️ 爱心卡片：0 / 40 张</span>
</div>

<script>
    // ========== 关心话语库 (8句温暖提醒) ==========
    const messages = [
        "好好休息", "注意保暖", "多喝热水",
        "好好吃饭", "别熬夜", "顺顺利利",
        "对自己好", "偶尔运动"
    ];
    
    let cardsArray = [];
    let autoInterval = null;
    let finalShown = false;
    const MAX_CARDS = 40;
    const canvas = document.getElementById('heartCanvas');
    let resizeTimer = null;
    
    // 随机柔和颜色
    function getRandomPastel() {
        const hue = Math.floor(Math.random() * 360);
        const sat = 45 + Math.floor(Math.random() * 31);
        const lit = 68 + Math.floor(Math.random() * 20);
        return `hsl(${hue}, ${sat}%, ${lit}%)`;
    }
    
    function getRandomMessage() {
        return messages[Math.floor(Math.random() * messages.length)];
    }
    
    function createCardElement(text, bgColor) {
        const card = document.createElement('div');
        card.className = 'care-card';
        card.textContent = text;
        card.style.backgroundColor = bgColor;
        card.style.color = '#2c241f';
        card.style.transition = 'left 0.55s cubic-bezier(0.2, 0.9, 0.35, 1.2), top 0.55s cubic-bezier(0.2, 0.9, 0.35, 1.2), transform 0.2s';
        return card;
    }
    
    /**
     * 重新设计心形曲线 —— 彻底解决两侧扁平，让爱心左右圆润隆起
     * 核心思路：
     * 1. x方向使用更大系数并加上基于角度的膨胀项，让左右两侧明显突出
     * 2. y方向配合调节，使整体保持心形特征，底部尖，顶部内凹自然
     * 3. 根据屏幕宽高比动态缩放，手机端横向拉伸更强
     */
    function getHeartPosition(ratio, canvasRect) {
        const angle = ratio * Math.PI * 2;
        
        // 大幅增强横向幅值: 使用 sin^3 经典基底，再叠加 sin^2 额外膨胀
        let xRaw = 18.5 * Math.pow(Math.sin(angle), 3);
        // 额外增加左右两侧的膨胀: 当 sin(angle) 绝对值大时 (左/右侧) 再增加横向伸展
        const sideBoost = Math.pow(Math.abs(Math.sin(angle)), 1.5) * 2.4;
        xRaw = xRaw + sideBoost;
        
        // y轴采用多重谐波，让心形底部尖，顶部有可爱凹陷
        let yRaw = 14.2 * Math.cos(angle) 
                 - 6.3 * Math.cos(2 * angle) 
                 - 2.9 * Math.cos(3 * angle) 
                 - 1.6 * Math.cos(4 * angle);
        
        // 顶部区域平滑修正，让心形顶部中央略微内收但保持弧度
        const twoPi = Math.PI * 2;
        const isTop = (angle < 0.6) || (angle > twoPi - 0.6);
        let topAdjust = 0;
        if (isTop) {
            let dist = Math.min(angle, twoPi - angle);
            let intensity = Math.sin(Math.min(1.57, dist * 2.2));
            topAdjust = 1.4 * (1 - intensity);
            yRaw = yRaw + topAdjust;
        }
        
        // 左右两侧额外增加y轴柔和曲线，使心形饱满不塌陷
        let lateralY = Math.pow(Math.sin(angle), 2) * 0.7;
        yRaw = yRaw - lateralY * 0.3;
        
        // 动态缩放: 根据画布宽高比
        const aspect = canvasRect.width / canvasRect.height;
        let baseScale = Math.min(canvasRect.width, canvasRect.height) / 32.5;
        // 横向缩放增强，让爱心明显变宽 (解决两侧平的问题)
        let scaleX = baseScale * (aspect < 0.85 ? 1.32 : 1.22);
        let scaleY = baseScale * (aspect < 0.85 ? 1.24 : 1.18);
        
        let posX = canvasRect.width / 2 + xRaw * scaleX;
        let posY = canvasRect.height / 2 - yRaw * scaleY * 0.96;
        
        // 增加边界保护，防止卡片超出可视区
        const marginX = 45;
        const marginY = 48;
        posX = Math.min(Math.max(posX, marginX), canvasRect.width - marginX);
        posY = Math.min(Math.max(posY, marginY), canvasRect.height - marginY);
        
        return { x: posX, y: posY };
    }
    
    // 将所有卡片排列到爱心形状上
    function rearrangeToHeart() {
        if (!canvas) return;
        const rect = canvas.getBoundingClientRect();
        if (rect.width === 0 || rect.height === 0) return;
        const count = cardsArray.length;
        
        const counterSpan = document.getElementById('cardCounter');
        if (counterSpan) {
            counterSpan.innerHTML = `❤️ 爱心卡片：${count} / ${MAX_CARDS} 张 💌`;
        }
        if (count === 0) return;
        
        for (let i = 0; i < count; i++) {
            const ratio = i / count;
            const { x, y } = getHeartPosition(ratio, rect);
            const card = cardsArray[i];
            if (card) {
                card.style.left = x + 'px';
                card.style.top = y + 'px';
            }
        }
    }
    
    // 监听窗口变化
    window.addEventListener('resize', () => {
        if (resizeTimer) clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
            if (cardsArray.length > 0) rearrangeToHeart();
        }, 120);
    });
    
    const resizeObserver = new ResizeObserver(() => {
        if (cardsArray.length > 0) rearrangeToHeart();
    });
    if (canvas) resizeObserver.observe(canvas);
    
    window.addEventListener('orientationchange', () => {
        setTimeout(() => {
            if (cardsArray.length) rearrangeToHeart();
        }, 100);
    });
    
    // 最终告白弹窗
    function showFinalConfession() {
        if (finalShown) return;
        finalShown = true;
        
        let existingModal = document.querySelector('.final-modal');
        if (existingModal) {
            existingModal.classList.remove('show');
            setTimeout(() => {
                if (existingModal.parentNode) existingModal.remove();
                createFinalModal();
            }, 180);
        } else {
            createFinalModal();
        }
    }
    
    function createFinalModal() {
        const modalDiv = document.createElement('div');
        modalDiv.className = 'final-modal';
        modalDiv.textContent = '✨ 我想和你一直走下去！ ✨';
        document.body.appendChild(modalDiv);
        setTimeout(() => {
            modalDiv.classList.add('show');
        }, 10);
        setTimeout(() => {
            if (modalDiv && modalDiv.parentNode) {
                modalDiv.classList.remove('show');
                setTimeout(() => {
                    if (modalDiv.parentNode) modalDiv.remove();
                }, 320);
            }
        }, 4000);
    }
    
    // 添加一张卡片
    let addLock = false;
    function addOneCard(manual = false) {
        if (addLock) return false;
        if (cardsArray.length >= MAX_CARDS) {
            if (!finalShown && cardsArray.length === MAX_CARDS) {
                showFinalConfession();
                if (autoInterval) {
                    clearInterval(autoInterval);
                    autoInterval = null;
                }
            }
            return false;
        }
        
        addLock = true;
        
        const randomMsg = getRandomMessage();
        const randomColor = getRandomPastel();
        const newCard = createCardElement(randomMsg, randomColor);
        canvas.appendChild(newCard);
        cardsArray.push(newCard);
        
        const rect = canvas.getBoundingClientRect();
        if (rect.width && rect.height) {
            newCard.style.left = rect.width / 2 + 'px';
            newCard.style.top = rect.height / 2 + 20 + 'px';
        } else {
            newCard.style.left = '50%';
            newCard.style.top = '55%';
        }
        
        setTimeout(() => {
            rearrangeToHeart();
        }, 20);
        
        if (cardsArray.length === MAX_CARDS) {
            if (autoInterval) {
                clearInterval(autoInterval);
                autoInterval = null;
            }
            if (!finalShown) {
                setTimeout(() => {
                    showFinalConfession();
                }, 220);
            }
        }
        
        setTimeout(() => { addLock = false; }, 260);
        return true;
    }
    
    // 自动增加卡片 (0 -> 40)
    function startAutoIncrease() {
        if (autoInterval) clearInterval(autoInterval);
        autoInterval = setInterval(() => {
            if (cardsArray.length >= MAX_CARDS) {
                if (autoInterval) {
                    clearInterval(autoInterval);
                    autoInterval = null;
                }
                return;
            }
            addOneCard(false);
        }, 450);
    }
    
    // 手动按钮
    const addBtn = document.getElementById('addBtn');
    if (addBtn) {
        addBtn.addEventListener('click', (e) => {
            e.preventDefault();
            if (cardsArray.length < MAX_CARDS) {
                addOneCard(true);
            } else if (!finalShown) {
                showFinalConfession();
            }
        });
    }
    
    const finalBtn = document.getElementById('finalBtn');
    if (finalBtn) {
        finalBtn.addEventListener('click', (e) => {
            e.preventDefault();
            showFinalConfession();
        });
    }
    
    if (canvas) {
        canvas.addEventListener('dblclick', (e) => {
            e.stopPropagation();
            if (cardsArray.length < MAX_CARDS) addOneCard(true);
        });
    }
    
    // 页面加载: 清空旧数据，从0开始自动增加
    window.addEventListener('load', () => {
        while (canvas.firstChild) canvas.removeChild(canvas.firstChild);
        cardsArray = [];
        finalShown = false;
        if (autoInterval) clearInterval(autoInterval);
        
        const counterSpan = document.getElementById('cardCounter');
        if (counterSpan) counterSpan.innerHTML = `❤️ 爱心卡片：0 / ${MAX_CARDS} 张 💌`;
        
        startAutoIncrease();
        
        setTimeout(() => {
            rearrangeToHeart();
        }, 100);
    });
    
    // 确保每次布局变换后重新排列
    window.addEventListener('resize', () => {
        if (cardsArray.length) rearrangeToHeart();
    });
    
    const ensureHeart = () => {
        if (cardsArray.length && canvas.getBoundingClientRect().width > 10) {
            rearrangeToHeart();
        }
        requestAnimationFrame(() => {
            if (cardsArray.length) rearrangeToHeart();
        });
    };
    setTimeout(ensureHeart, 200);
    document.fonts?.ready?.then(() => {
        if (cardsArray.length) rearrangeToHeart();
    });
</script>
</body>
</html>
