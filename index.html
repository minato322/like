<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>自动爱心告白 · 40张卡片的心动之旅</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fff5ee 0%, #ffebf0 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px 0 20px 0;
            position: relative;
        }

        /* 爱心画布容器 */
        .heart-canvas {
            position: relative;
            width: 100%;
            height: 68vh;
            min-height: 460px;
            max-height: 620px;
            margin: 12px 0 16px 0;
            overflow: visible;
            touch-action: pan-x pan-y;
        }

        /* 卡片 (弹窗样式) */
        .care-card {
            position: absolute;
            width: 104px;
            height: 94px;
            background: #fff4e8;
            border-radius: 28px 16px 28px 16px;
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.12), 0 0 0 2px rgba(255, 245, 235, 0.8) inset;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: 600;
            font-size: 1rem;
            color: #2c241a;
            cursor: pointer;
            transition: left 0.55s cubic-bezier(0.2, 0.85, 0.4, 1.1), top 0.55s cubic-bezier(0.2, 0.85, 0.4, 1.1), transform 0.2s ease;
            backdrop-filter: blur(1px);
            word-break: break-word;
            padding: 8px;
            z-index: 10;
            line-height: 1.3;
            will-change: left, top;
            transform: translate(-50%, -50%);
            font-family: inherit;
        }

        .care-card:hover {
            transform: translate(-50%, -50%) scale(1.04);
            box-shadow: 0 18px 28px rgba(0, 0, 0, 0.18);
            z-index: 20;
        }

        /* 控制按钮组 */
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 18px;
            margin: 8px 0 12px;
            z-index: 30;
            padding: 0 12px;
        }

        button {
            background: #ff859f;
            border: none;
            padding: 12px 28px;
            font-size: 1.05rem;
            font-weight: 600;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            box-shadow: 0 5px 0 #b14862;
            transition: 0.08s linear;
            font-family: inherit;
            letter-spacing: 1px;
            backdrop-filter: blur(4px);
            touch-action: manipulation;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #b14862;
        }

        .special-btn {
            background: #ff5a7c;
            box-shadow: 0 5px 0 #a13c54;
            font-size: 1.1rem;
            padding: 12px 30px;
            animation: softGlow 1.8s infinite;
        }

        @keyframes softGlow {
            0% {
                box-shadow: 0 5px 0 #a13c54, 0 0 0 0 rgba(255, 90, 124, 0.4);
            }
            70% {
                box-shadow: 0 5px 0 #a13c54, 0 0 0 12px rgba(255, 90, 124, 0);
            }
            100% {
                box-shadow: 0 5px 0 #a13c54, 0 0 0 0 rgba(255, 90, 124, 0);
            }
        }

        .info {
            background: rgba(255, 245, 235, 0.9);
            backdrop-filter: blur(12px);
            padding: 8px 20px;
            border-radius: 48px;
            font-size: 0.85rem;
            color: #aa4e66;
            font-weight: 500;
            border: 1px solid #ffcdd9;
            margin-top: 6px;
            text-align: center;
            width: 90%;
        }

        .counter-badge {
            background: #ffbfcf;
            padding: 5px 14px;
            border-radius: 40px;
            color: #572c3a;
            font-weight: bold;
            font-size: 0.85rem;
            display: inline-block;
            margin-top: 8px;
        }

        /* 最终告白弹窗 (中间弹出) 正常字体 */
        .final-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: #fffaf5;
            padding: 22px 32px;
            border-radius: 56px;
            box-shadow: 0 28px 44px rgba(0, 0, 0, 0.25), 0 0 0 6px #ffe2ea, 0 0 0 12px #ffb0c0;
            text-align: center;
            font-size: 1.6rem;
            font-weight: 700;
            color: #ce4162;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            letter-spacing: 1px;
            backdrop-filter: blur(20px);
            white-space: nowrap;
            border: 1px solid #ffbfce;
            line-height: 1.4;
        }

        @media (max-width: 560px) {
            .final-modal {
                font-size: 1.25rem;
                padding: 16px 24px;
                white-space: normal;
                width: 80%;
                text-align: center;
            }
        }

        .final-modal.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
            animation: bouncePop 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
        }

        @keyframes bouncePop {
            0% {
                transform: translate(-50%, -50%) scale(0.7);
                opacity: 0;
            }
            80% {
                transform: translate(-50%, -50%) scale(1.05);
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        @media (max-width: 680px) {
            .care-card {
                width: 84px;
                height: 78px;
                font-size: 0.8rem;
                padding: 5px;
                border-radius: 22px 12px 22px 12px;
            }
            .heart-canvas {
                height: 62vh;
                min-height: 420px;
            }
            button {
                padding: 10px 20px;
                font-size: 0.95rem;
            }
            .special-btn {
                padding: 10px 22px;
            }
        }
    </style>
</head>
<body>

<div class="heart-canvas" id="heartCanvas"></div>

<div class="controls">
    <button id="addBtn">✨ 手动加一张 ✨</button>
    <button id="finalBtn" class="special-btn">💖 提前告白 💖</button>
</div>
<div class="info">
    💗 卡片将自动慢慢增加到40张，组成爱心形状，最后弹出告白 💗<br>
    <span class="counter-badge" id="cardCounter">❤️ 爱心卡片：0 / 40 张</span>
</div>

<script>
    // ========== 关心话语库 (8句温暖提醒) ==========
    const messages = [
        "好好休息", "注意保暖", "多喝热水",
        "好好吃饭", "别熬夜", "顺顺利利",
        "对自己好", "偶尔运动"
    ];
    
    let cardsArray = [];          // 存储所有卡片DOM
    let autoInterval = null;      // 自动增加定时器
    let finalShown = false;       // 是否已弹出最终告白（只弹一次）
    const MAX_CARDS = 40;         // 最大卡片数量
    
    const canvas = document.getElementById('heartCanvas');
    let resizeTimer = null;
    
    // 随机柔和颜色 (饱和度 45%~76%，明度 68%~88%)
    function getRandomPastel() {
        const hue = Math.floor(Math.random() * 360);
        const sat = 45 + Math.floor(Math.random() * 31);
        const lit = 68 + Math.floor(Math.random() * 20);
        return `hsl(${hue}, ${sat}%, ${lit}%)`;
    }
    
    // 随机取一句关心语
    function getRandomMessage() {
        return messages[Math.floor(Math.random() * messages.length)];
    }
    
    // 创建卡片元素
    function createCardElement(text, bgColor) {
        const card = document.createElement('div');
        card.className = 'care-card';
        card.textContent = text;
        card.style.backgroundColor = bgColor;
        card.style.color = '#2c241f';
        card.style.transition = 'left 0.55s cubic-bezier(0.2, 0.9, 0.35, 1.2), top 0.55s cubic-bezier(0.2, 0.9, 0.35, 1.2), transform 0.2s';
        return card;
    }
    
    /**
     * 优化心形曲线 —— 解决顶部平坦问题，让爱心饱满圆润
     * 增加顶部隆起系数，底部尖锐，完美心形
     */
    function getHeartPosition(ratio, canvasRect) {
        const angle = ratio * Math.PI * 2;  // 0 ～ 2π
        
        // 经典心形基底 (加强顶部)
        let xRaw = 16 * Math.pow(Math.sin(angle), 3);
        let yRaw = 13.5 * Math.cos(angle) 
                 - 5.2 * Math.cos(2 * angle) 
                 - 2.6 * Math.cos(3 * angle) 
                 - 1.4 * Math.cos(4 * angle);
        
        // ===== 顶部饱满度增强 =====
        const twoPi = Math.PI * 2;
        const isTopRegion = (angle < 0.48) || (angle > twoPi - 0.48);
        let topLift = 0;
        if (isTopRegion) {
            let dist = Math.min(angle, twoPi - angle);
            const intensity = Math.sin(Math.min(1, dist / 0.48) * Math.PI / 2);
            topLift = 1.65 * (1 - intensity);
            if (topLift > 0.1) {
                xRaw = xRaw * (1 + 0.03 * (1 - intensity));
            }
        }
        const upLift = Math.max(0, Math.cos(angle)) * 0.6;
        yRaw = yRaw + topLift + upLift;
        
        const baseScale = Math.min(canvasRect.width, canvasRect.height) / 29.5;
        const scaleX = baseScale * 1.08;
        const scaleY = baseScale * 1.14;
        
        let posX = canvasRect.width / 2 + xRaw * scaleX;
        let posY = canvasRect.height / 2 - yRaw * scaleY * 0.96;
        
        const margin = 48;
        posX = Math.min(Math.max(posX, margin), canvasRect.width - margin);
        posY = Math.min(Math.max(posY, margin), canvasRect.height - margin);
        
        return { x: posX, y: posY };
    }
    
    // 排列所有卡片到爱心形状上 (每次添加后自动调用，慢慢变成爱心)
    function rearrangeToHeart() {
        if (!canvas) return;
        const rect = canvas.getBoundingClientRect();
        if (rect.width === 0 || rect.height === 0) return;
        const count = cardsArray.length;
        
        // 更新计数器显示
        const counterSpan = document.getElementById('cardCounter');
        if (counterSpan) {
            counterSpan.innerHTML = `❤️ 爱心卡片：${count} / ${MAX_CARDS} 张 💌`;
        }
        
        if (count === 0) return;
        
        for (let i = 0; i < count; i++) {
            const ratio = i / count;
            const { x, y } = getHeartPosition(ratio, rect);
            const card = cardsArray[i];
            if (card) {
                card.style.left = x + 'px';
                card.style.top = y + 'px';
            }
        }
    }
    
    // 监听窗口尺寸变化，重新排列爱心
    window.addEventListener('resize', () => {
        if (resizeTimer) clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
            if (cardsArray.length > 0) rearrangeToHeart();
        }, 120);
    });
    
    const resizeObserver = new ResizeObserver(() => {
        if (cardsArray.length > 0) rearrangeToHeart();
    });
    if (canvas) resizeObserver.observe(canvas);
    
    window.addEventListener('orientationchange', () => {
        setTimeout(() => {
            if (cardsArray.length) rearrangeToHeart();
        }, 80);
    });
    
    // 最终告白弹窗 (系统字体，内容为指定语句)
    function showFinalConfession() {
        if (finalShown) return;
        finalShown = true;
        
        let existingModal = document.querySelector('.final-modal');
        if (existingModal) {
            existingModal.classList.remove('show');
            setTimeout(() => {
                if (existingModal.parentNode) existingModal.remove();
                createFinalModal();
            }, 180);
        } else {
            createFinalModal();
        }
    }
    
    function createFinalModal() {
        const modalDiv = document.createElement('div');
        modalDiv.className = 'final-modal';
        modalDiv.textContent = '✨ 我想和你一直走下去！ ✨';
        document.body.appendChild(modalDiv);
        setTimeout(() => {
            modalDiv.classList.add('show');
        }, 10);
        setTimeout(() => {
            if (modalDiv && modalDiv.parentNode) {
                modalDiv.classList.remove('show');
                setTimeout(() => {
                    if (modalDiv.parentNode) modalDiv.remove();
                }, 320);
            }
        }, 4000);
    }
    
    // 添加一张新卡片 (核心逻辑，自动或手动调用)
    let addLock = false;
    function addOneCard(manual = false) {
        if (addLock) return false;
        
        // 已达上限则不再添加
        if (cardsArray.length >= MAX_CARDS) {
            // 如果满40张且还没弹出最终告白，立刻弹出
            if (!finalShown && cardsArray.length === MAX_CARDS) {
                showFinalConfession();
                // 停止自动定时器
                if (autoInterval) {
                    clearInterval(autoInterval);
                    autoInterval = null;
                }
            }
            return false;
        }
        
        addLock = true;
        
        const randomMsg = getRandomMessage();
        const randomColor = getRandomPastel();
        const newCard = createCardElement(randomMsg, randomColor);
        
        canvas.appendChild(newCard);
        cardsArray.push(newCard);
        
        // 临时放置位置：从爱心中央区域附近出现
        const rect = canvas.getBoundingClientRect();
        if (rect.width && rect.height) {
            newCard.style.left = rect.width / 2 + 'px';
            newCard.style.top = rect.height / 2 + 20 + 'px';
        } else {
            newCard.style.left = '50%';
            newCard.style.top = '55%';
        }
        
        // 重排所有卡片 → 旧卡片 + 新卡片 一起移动到新的心形位置，实现“慢慢变成爱心形状”
        setTimeout(() => {
            rearrangeToHeart();
        }, 20);
        
        // 检查是否达到上限，达到则清除定时器并弹出告白
        if (cardsArray.length === MAX_CARDS) {
            if (autoInterval) {
                clearInterval(autoInterval);
                autoInterval = null;
            }
            if (!finalShown) {
                // 稍微延迟一点让最后一张卡片完全进入爱心再弹告白
                setTimeout(() => {
                    showFinalConfession();
                }, 200);
            }
        }
        
        setTimeout(() => { addLock = false; }, 260);
        return true;
    }
    
    // 自动增加卡片，从0开始慢慢到40
    function startAutoIncrease() {
        if (autoInterval) clearInterval(autoInterval);
        // 每0.45秒增加一张，速度适中，视觉舒适
        autoInterval = setInterval(() => {
            if (cardsArray.length >= MAX_CARDS) {
                if (autoInterval) {
                    clearInterval(autoInterval);
                    autoInterval = null;
                }
                return;
            }
            addOneCard(false);
        }, 450);
    }
    
    // 手动添加按钮 (受最大数量限制)
    const addBtn = document.getElementById('addBtn');
    if (addBtn) {
        addBtn.addEventListener('click', (e) => {
            e.preventDefault();
            if (cardsArray.length < MAX_CARDS) {
                addOneCard(true);
            } else {
                // 已达上限提醒但无副作用
                if (!finalShown) showFinalConfession();
            }
        });
    }
    
    // 提前告白按钮 (不影响自动流程)
    const finalBtn = document.getElementById('finalBtn');
    if (finalBtn) {
        finalBtn.addEventListener('click', (e) => {
            e.preventDefault();
            showFinalConfession();
        });
    }
    
    // 双击画布也增加卡片（小彩蛋）
    if (canvas) {
        canvas.addEventListener('dblclick', (e) => {
            e.stopPropagation();
            if (cardsArray.length < MAX_CARDS) {
                addOneCard(true);
            }
        });
    }
    
    // 页面完全加载后: 初始0卡片，启动自动增长，最终弹出告白
    window.addEventListener('load', () => {
        // 确保画布空容器干净 (无初始卡片)
        // 清空canvas下所有子元素 (但保留可能存在的旧内容，实际没有)
        while (canvas.firstChild) {
            canvas.removeChild(canvas.firstChild);
        }
        cardsArray = [];
        finalShown = false;
        if (autoInterval) clearInterval(autoInterval);
        
        // 重置计数器显示
        const counterSpan = document.getElementById('cardCounter');
        if (counterSpan) counterSpan.innerHTML = `❤️ 爱心卡片：0 / ${MAX_CARDS} 张 💌`;
        
        // 启动自动增加
        startAutoIncrease();
        
        // 确保心形布局在每一帧稳定
        setTimeout(() => {
            rearrangeToHeart();
        }, 100);
    });
    
    // 多重保险：每次重绘窗口或字体加载后重新排列，爱心始终饱满
    window.addEventListener('resize', () => {
        if (cardsArray.length) rearrangeToHeart();
    });
    
    const ensureHeart = () => {
        if (cardsArray.length && canvas.getBoundingClientRect().width > 10) {
            rearrangeToHeart();
        }
        requestAnimationFrame(() => {
            if (cardsArray.length) rearrangeToHeart();
        });
    };
    setTimeout(ensureHeart, 200);
    document.fonts?.ready?.then(() => {
        if (cardsArray.length) rearrangeToHeart();
    });
</script>
</body>
</html>
