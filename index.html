<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>爱心告白 · 自动满心40张</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fff5ee 0%, #ffebf0 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px 0 20px 0;
            position: relative;
        }

        .heart-canvas {
            position: relative;
            width: 100%;
            height: 68vh;
            min-height: 460px;
            max-height: 620px;
            margin: 12px 0 16px 0;
            overflow: visible;
            touch-action: pan-x pan-y;
        }

        .care-card {
            position: absolute;
            width: 104px;
            height: 94px;
            background: #fff4e8;
            border-radius: 28px 16px 28px 16px;
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.12), 0 0 0 2px rgba(255, 245, 235, 0.8) inset;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: 600;
            font-size: 1rem;
            color: #2c241a;
            cursor: pointer;
            transition: left 0.55s cubic-bezier(0.2, 0.85, 0.4, 1.1), top 0.55s cubic-bezier(0.2, 0.85, 0.4, 1.1), transform 0.2s ease;
            backdrop-filter: blur(1px);
            word-break: break-word;
            padding: 8px;
            z-index: 10;
            line-height: 1.3;
            will-change: left, top;
            transform: translate(-50%, -50%);
            font-family: inherit;
        }

        .care-card:hover {
            transform: translate(-50%, -50%) scale(1.04);
            box-shadow: 0 18px 28px rgba(0, 0, 0, 0.18);
            z-index: 20;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 18px;
            margin: 8px 0 12px;
            z-index: 30;
            padding: 0 12px;
        }

        button {
            background: #ff859f;
            border: none;
            padding: 12px 28px;
            font-size: 1.05rem;
            font-weight: 600;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            box-shadow: 0 5px 0 #b14862;
            transition: 0.08s linear;
            font-family: inherit;
            letter-spacing: 1px;
            backdrop-filter: blur(4px);
            touch-action: manipulation;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #b14862;
        }

        .special-btn {
            background: #ff5a7c;
            box-shadow: 0 5px 0 #a13c54;
            font-size: 1.1rem;
            padding: 12px 30px;
            animation: softGlow 1.8s infinite;
        }

        @keyframes softGlow {
            0% {
                box-shadow: 0 5px 0 #a13c54, 0 0 0 0 rgba(255, 90, 124, 0.4);
            }
            70% {
                box-shadow: 0 5px 0 #a13c54, 0 0 0 12px rgba(255, 90, 124, 0);
            }
            100% {
                box-shadow: 0 5px 0 #a13c54, 0 0 0 0 rgba(255, 90, 124, 0);
            }
        }

        .info {
            background: rgba(255, 245, 235, 0.9);
            backdrop-filter: blur(12px);
            padding: 8px 20px;
            border-radius: 48px;
            font-size: 0.85rem;
            color: #aa4e66;
            font-weight: 500;
            border: 1px solid #ffcdd9;
            margin-top: 6px;
            text-align: center;
            width: 90%;
        }

        .counter-badge {
            background: #ffbfcf;
            padding: 5px 14px;
            border-radius: 40px;
            color: #572c3a;
            font-weight: bold;
            font-size: 0.85rem;
            display: inline-block;
            margin-top: 8px;
        }

        .final-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: #fffaf5;
            padding: 22px 32px;
            border-radius: 56px;
            box-shadow: 0 28px 44px rgba(0, 0, 0, 0.25), 0 0 0 6px #ffe2ea, 0 0 0 12px #ffb0c0;
            text-align: center;
            font-size: 1.6rem;
            font-weight: 700;
            color: #ce4162;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            letter-spacing: 1px;
            backdrop-filter: blur(20px);
            white-space: nowrap;
            border: 1px solid #ffbfce;
            line-height: 1.4;
        }

        @media (max-width: 560px) {
            .final-modal {
                font-size: 1.25rem;
                padding: 16px 24px;
                white-space: normal;
                width: 80%;
                text-align: center;
            }
        }

        .final-modal.show {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
            animation: bouncePop 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
        }

        @keyframes bouncePop {
            0% {
                transform: translate(-50%, -50%) scale(0.7);
                opacity: 0;
            }
            80% {
                transform: translate(-50%, -50%) scale(1.05);
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        @media (max-width: 680px) {
            .care-card {
                width: 84px;
                height: 78px;
                font-size: 0.8rem;
                padding: 5px;
                border-radius: 22px 12px 22px 12px;
            }
            .heart-canvas {
                height: 62vh;
                min-height: 420px;
            }
            button {
                padding: 10px 20px;
                font-size: 0.95rem;
            }
            .special-btn {
                padding: 10px 22px;
            }
        }
    </style>
</head>
<body>

<div class="heart-canvas" id="heartCanvas"></div>

<div class="controls">
    <button id="addBtn">✨ 手动加一张 ✨</button>
    <button id="finalBtn" class="special-btn">💖 提前告白 💖</button>
</div>
<div class="info">
    💗 卡片将自动慢慢增加到40张，组成爱心形状，最后弹出告白 💗<br>
    <span class="counter-badge" id="cardCounter">❤️ 爱心卡片：0 / 40 张</span>
</div>

<script>
    // ========== 关心话语库 ==========
    const messages = [
        "好好休息", "注意保暖", "多喝热水",
        "好好吃饭", "别熬夜", "顺顺利利",
        "对自己好", "偶尔运动"
    ];
    
    let cardsArray = [];
    let autoInterval = null;
    let finalShown = false;
    const MAX_CARDS = 40;
    const canvas = document.getElementById('heartCanvas');
    let resizeTimer = null;
    
    function getRandomPastel() {
        const hue = Math.floor(Math.random() * 360);
        const sat = 45 + Math.floor(Math.random() * 31);
        const lit = 68 + Math.floor(Math.random() * 20);
        return `hsl(${hue}, ${sat}%, ${lit}%)`;
    }
    
    function getRandomMessage() {
        return messages[Math.floor(Math.random() * messages.length)];
    }
    
    function createCardElement(text, bgColor) {
        const card = document.createElement('div');
        card.className = 'care-card';
        card.textContent = text;
        card.style.backgroundColor = bgColor;
        card.style.color = '#2c241f';
        card.style.transition = 'left 0.55s cubic-bezier(0.2, 0.9, 0.35, 1.2), top 0.55s cubic-bezier(0.2, 0.9, 0.35, 1.2), transform 0.2s';
        return card;
    }
    
    /**
     * 全新高精度心形曲线 —— 彻底解决手机端两边扁平的问题
     * 采用经典的“参数加强型”心形公式，通过动态调整 x 轴膨胀系数和 y 轴对称隆起，
     * 让爱心左右两侧饱满圆润，顶部弧度优雅，底部心尖锐利。
     * 同时根据画布宽高比动态伸缩，确保在不同屏幕上都像完美爱心。
     */
    function getHeartPosition(ratio, canvasRect) {
        const angle = ratio * Math.PI * 2; // 0 到 2π
        
        // 增强版心形基底 (x 轴使用了更扩展的 sin^3 系数，y 轴多重谐波让两侧更饱满)
        let xRaw = 17.2 * Math.pow(Math.sin(angle), 3);
        
        // y 轴关键改进: 增加 cos(2t) 和 cos(4t) 的权重，使左右两侧向外隆起
        // 经过多次测试，以下系数能产生漂亮的“上圆下尖”轮廓，两侧弧度明显
        let yRaw = 13.2 * Math.cos(angle) 
                 - 5.8 * Math.cos(2 * angle) 
                 - 2.4 * Math.cos(3 * angle) 
                 - 1.9 * Math.cos(4 * angle);
        
        // 针对顶部和两侧额外微调：在水平角度靠近 π/2 和 3π/2 (左右最宽处) 时增加横向外扩
        const horizontalBoost = Math.sin(angle); // 左右两侧 sin值最大
        const sideBonus = Math.pow(Math.abs(Math.sin(angle)), 1.2) * 0.65;
        xRaw = xRaw + sideBonus * 1.2;
        
        // 顶部补偿: 使心形上部更圆润 (angle 靠近 0 或 2π)
        const twoPi = Math.PI * 2;
        const isTop = (angle < 0.55) || (angle > twoPi - 0.55);
        let topExtraY = 0;
        if (isTop) {
            let dist = Math.min(angle, twoPi - angle);
            let intensity = Math.cos(Math.min(1.57, dist * 2.2));
            topExtraY = 1.7 * (1 - intensity * 0.8);
            yRaw = yRaw + topExtraY;
        }
        
        // 左右最宽处的曲率平滑 (让两侧不突兀)
        let sideYAdjust = Math.pow(Math.sin(angle), 2) * 0.4;
        yRaw = yRaw - sideYAdjust * 0.3;
        
        // 根据屏幕宽高比动态调整纵横缩放因子，防止手机窄屏时爱心被压扁
        const aspect = canvasRect.width / canvasRect.height;
        // 基础缩放 (适配不同大小)
        let baseScale = Math.min(canvasRect.width, canvasRect.height) / 30.5;
        // 动态修正: 如果屏幕较窄(手机)，横向缩放略微加大，让爱心保持圆润
        let scaleX = baseScale * (aspect < 0.8 ? 1.18 : 1.08);
        let scaleY = baseScale * (aspect < 0.8 ? 1.22 : 1.14);
        
        let posX = canvasRect.width / 2 + xRaw * scaleX;
        let posY = canvasRect.height / 2 - yRaw * scaleY * 0.96;
        
        // 增加边缘保护，确保卡片不超出边界
        const marginX = 52;
        const marginY = 52;
        posX = Math.min(Math.max(posX, marginX), canvasRect.width - marginX);
        posY = Math.min(Math.max(posY, marginY), canvasRect.height - marginY);
        
        return { x: posX, y: posY };
    }
    
    // 将所有卡片排列成爱心形状
    function rearrangeToHeart() {
        if (!canvas) return;
        const rect = canvas.getBoundingClientRect();
        if (rect.width === 0 || rect.height === 0) return;
        const count = cardsArray.length;
        
        const counterSpan = document.getElementById('cardCounter');
        if (counterSpan) {
            counterSpan.innerHTML = `❤️ 爱心卡片：${count} / ${MAX_CARDS} 张 💌`;
        }
        if (count === 0) return;
        
        for (let i = 0; i < count; i++) {
            const ratio = i / count;
            const { x, y } = getHeartPosition(ratio, rect);
            const card = cardsArray[i];
            if (card) {
                card.style.left = x + 'px';
                card.style.top = y + 'px';
            }
        }
    }
    
    // 监听窗口变化，重新排列
    window.addEventListener('resize', () => {
        if (resizeTimer) clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
            if (cardsArray.length > 0) rearrangeToHeart();
        }, 120);
    });
    
    const resizeObserver = new ResizeObserver(() => {
        if (cardsArray.length > 0) rearrangeToHeart();
    });
    if (canvas) resizeObserver.observe(canvas);
    
    window.addEventListener('orientationchange', () => {
        setTimeout(() => {
            if (cardsArray.length) rearrangeToHeart();
        }, 100);
    });
    
    // 最终告白弹窗
    function showFinalConfession() {
        if (finalShown) return;
        finalShown = true;
        
        let existingModal = document.querySelector('.final-modal');
        if (existingModal) {
            existingModal.classList.remove('show');
            setTimeout(() => {
                if (existingModal.parentNode) existingModal.remove();
                createFinalModal();
            }, 180);
        } else {
            createFinalModal();
        }
    }
    
    function createFinalModal() {
        const modalDiv = document.createElement('div');
        modalDiv.className = 'final-modal';
        modalDiv.textContent = '✨ 我想和你一直走下去！ ✨';
        document.body.appendChild(modalDiv);
        setTimeout(() => {
            modalDiv.classList.add('show');
        }, 10);
        setTimeout(() => {
            if (modalDiv && modalDiv.parentNode) {
                modalDiv.classList.remove('show');
                setTimeout(() => {
                    if (modalDiv.parentNode) modalDiv.remove();
                }, 320);
            }
        }, 4000);
    }
    
    // 添加一张卡片
    let addLock = false;
    function addOneCard(manual = false) {
        if (addLock) return false;
        if (cardsArray.length >= MAX_CARDS) {
            if (!finalShown && cardsArray.length === MAX_CARDS) {
                showFinalConfession();
                if (autoInterval) {
                    clearInterval(autoInterval);
                    autoInterval = null;
                }
            }
            return false;
        }
        
        addLock = true;
        
        const randomMsg = getRandomMessage();
        const randomColor = getRandomPastel();
        const newCard = createCardElement(randomMsg, randomColor);
        canvas.appendChild(newCard);
        cardsArray.push(newCard);
        
        const rect = canvas.getBoundingClientRect();
        if (rect.width && rect.height) {
            newCard.style.left = rect.width / 2 + 'px';
            newCard.style.top = rect.height / 2 + 20 + 'px';
        } else {
            newCard.style.left = '50%';
            newCard.style.top = '55%';
        }
        
        setTimeout(() => {
            rearrangeToHeart();
        }, 20);
        
        if (cardsArray.length === MAX_CARDS) {
            if (autoInterval) {
                clearInterval(autoInterval);
                autoInterval = null;
            }
            if (!finalShown) {
                setTimeout(() => {
                    showFinalConfession();
                }, 220);
            }
        }
        
        setTimeout(() => { addLock = false; }, 260);
        return true;
    }
    
    // 自动增加卡片
    function startAutoIncrease() {
        if (autoInterval) clearInterval(autoInterval);
        autoInterval = setInterval(() => {
            if (cardsArray.length >= MAX_CARDS) {
                if (autoInterval) {
                    clearInterval(autoInterval);
                    autoInterval = null;
                }
                return;
            }
            addOneCard(false);
        }, 450);
    }
    
    // 手动按钮
    const addBtn = document.getElementById('addBtn');
    if (addBtn) {
        addBtn.addEventListener('click', (e) => {
            e.preventDefault();
            if (cardsArray.length < MAX_CARDS) {
                addOneCard(true);
            } else if (!finalShown) {
                showFinalConfession();
            }
        });
    }
    
    const finalBtn = document.getElementById('finalBtn');
    if (finalBtn) {
        finalBtn.addEventListener('click', (e) => {
            e.preventDefault();
            showFinalConfession();
        });
    }
    
    if (canvas) {
        canvas.addEventListener('dblclick', (e) => {
            e.stopPropagation();
            if (cardsArray.length < MAX_CARDS) addOneCard(true);
        });
    }
    
    // 页面加载：从0开始自动慢慢增加到40
    window.addEventListener('load', () => {
        while (canvas.firstChild) canvas.removeChild(canvas.firstChild);
        cardsArray = [];
        finalShown = false;
        if (autoInterval) clearInterval(autoInterval);
        
        const counterSpan = document.getElementById('cardCounter');
        if (counterSpan) counterSpan.innerHTML = `❤️ 爱心卡片：0 / ${MAX_CARDS} 张 💌`;
        
        startAutoIncrease();
        
        setTimeout(() => {
            rearrangeToHeart();
        }, 100);
    });
    
    // 确保每次变换后重新排列心形
    window.addEventListener('resize', () => {
        if (cardsArray.length) rearrangeToHeart();
    });
    
    const ensureHeart = () => {
        if (cardsArray.length && canvas.getBoundingClientRect().width > 10) {
            rearrangeToHeart();
        }
        requestAnimationFrame(() => {
            if (cardsArray.length) rearrangeToHeart();
        });
    };
    setTimeout(ensureHeart, 200);
    document.fonts?.ready?.then(() => {
        if (cardsArray.length) rearrangeToHeart();
    });
</script>
</body>
</html>
